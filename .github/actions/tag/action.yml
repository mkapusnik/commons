name: Set Git Tag

description: |
  Create or update a lightweight Git tag pointing to a given commit SHA.
  Useful for marking builds like "sanity", "latest", etc.

inputs:
  tag:
    description: Tag name to create or update (without refs/tags/ prefix)
    required: true
  commit_sha:
    description: Commit SHA to tag. Defaults to context.sha.
    required: false
  token:
    description: GitHub token used for ref operations (use PAT to trigger downstream workflows).
    required: true

runs:
  using: composite
  steps:
    - name: Set tag "${{ inputs.tag }}" to SHA
      uses: actions/github-script@v8
      with:
        github-token: ${{ inputs.token }}
        script: |
          const tag = `${{ inputs.tag }}`.trim();
          if (!tag) throw new Error('Input "tag" must be a non-empty string');

          const props = {
            owner: context.repo.owner,
            repo: context.repo.repo,
          };

          const sha = `${{ inputs.commit_sha }}`.trim() || context.sha;
          
          try {
            await github.rest.git.createRef({ ...props, ref: `refs/tags/${tag}`, sha });
          } catch (err) {
            if (err.status !== 422) throw err;
            await github.rest.git.updateRef({ ...props, ref: `tags/${tag}`, sha, force: true });
          }
